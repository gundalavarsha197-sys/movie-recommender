<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5 text-center">

    <h1>🎬 Movie Recommendation System</h1>

    <form method="POST" action="/recommend" class="mt-4">
        <input list="movies" name="movie" class="form-control w-50 mx-auto" placeholder="Search movie..." required>

        <datalist id="movies">
            {% for movie in movies %}
                <option value="{{movie}}">
            {% endfor %}
        </datalist>

        <button class="btn btn-success mt-3">Recommend</button>
    </form>

    {% if names %}
    <h3 class="mt-5">Recommendations for "{{ selected }}"</h3>

    <div class="row mt-4">
        {% for i in range(names|length) %}
        <div class="col-md-3">
            <div class="card bg-secondary text-white mb-3">
                <img src="{{ posters[i] }}" class="card-img-top">
                <div class="card-body">
                    <h5>{{ names[i] }}</h5>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    {% endif %}

</div>

</body>
</html>
